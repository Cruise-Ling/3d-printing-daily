.filter-divider{width:1px;height:20px;background:#1e293b}

// ===== State =====
let activeFilters={region:'all',level:'all'};
let selectedBrand=null;
let searchQuery='';
let sortBy='name';

function isVisible(b){
  if(searchQuery){
    const q=searchQuery.toLowerCase();
    if(!b.name.toLowerCase().includes(q)&&!b.en.toLowerCase().includes(q))return false;
  }
  if(activeFilters.region!=='all'&&b.region!==activeFilters.region)return false;
  if(activeFilters.level!=='all'&&!b.levels.includes(activeFilters.level))return false;
  return true;
}

function updateStats(){
  const vis=brands.filter(b=>isVisible(b));
  document.getElementById('statTotal').textContent=vis.length;
  document.getElementById('statCN').textContent=vis.filter(b=>b.region==='cn').length;
  document.getElementById('statINTL').textContent=vis.filter(b=>b.region!=='cn').length;
  document.getElementById('statIndustrial').textContent=vis.filter(b=>b.levels.includes('industrial')).length;
}

function updateResultCount(){
  const filtered=brands.filter(b=>isVisible(b));
  document.getElementById('resultCount').textContent=`共 ${filtered.length} 个品牌`;
}

function updateFilterCountBadges(){
  document.querySelectorAll('.filter-btn').forEach(btn=>{
    const f=btn.dataset.filter,v=btn.dataset.value;
    let count;
    const backup=JSON.parse(JSON.stringify(activeFilters));
    activeFilters[f]=v;
    count=brands.filter(b=>isVisible(b)).length;
    activeFilters=backup;
    let badge=btn.querySelector('.filter-count');
    if(!badge){btn.innerHTML+=`<span class="filter-count">${count}</span>`;}
    else{badge.textContent=count;}
  });
}

function updateActiveFiltersBar(){
  const bar=document.getElementById('activeFilters');
  const tags=document.getElementById('activeFilterTags');
  let hasActive=false;
  let html='';
  if(activeFilters.region!=='all'){
    const labels={cn:'中国',us:'北美',eu:'欧洲'};
    html+=`<span class="active-filter-tag">${labels[activeFilters.region]} <span class="remove" data-filter="region">&times;</span></span>`;
    hasActive=true;
  }
  if(activeFilters.level!=='all'){
    const labels={consumer:'消费级',pro:'专业级',industrial:'工业级'};
    html+=`<span class="active-filter-tag">${labels[activeFilters.level]} <span class="remove" data-filter="level">&times;</span></span>`;
    hasActive=true;
  }
  if(searchQuery){
    html+=`<span class="active-filter-tag">搜索: "${searchQuery}" <span class="remove" data-filter="search">&times;</span></span>`;
    hasActive=true;
  }
  tags.innerHTML=html;
  bar.classList.toggle('show',hasActive);
  tags.querySelectorAll('.remove').forEach(sp=>{
    sp.addEventListener('click',()=>{
      const f=sp.dataset.filter;
      if(f==='search'){document.getElementById('searchInput').value='';searchQuery='';}
      else{activeFilters[f]='all';document.querySelectorAll(`.filter-btn[data-filter="${f}"]`)[0].classList.remove('active');}
      applyFilters();
    });
  });
}

function applyFilters(){
  let visibleCount=0;
  document.querySelectorAll('#tableContent tbody tr').forEach(tr=>{
    const b=brands.find(x=>x.id===tr.dataset.id);
    if(b&&isVisible(b)){
      tr.classList.remove('hidden');
      tr.classList.add('fade-in');
      visibleCount++;
    }else{
      tr.classList.add('hidden');
    }
  });
  updateResultCount();
  updateStats();
  updateFilterCountBadges();
  updateActiveFiltersBar();
}

// ===== Panel =====
function showDetail(b){
  selectedBrand=b;
  const isCN=b.region==='cn';
  document.getElementById('panelHeader').style.background=`linear-gradient(135deg,${b.color},${isCN?'#d97706':'#1d4ed8'})`;
  document.getElementById('panelName').textContent=b.name;
  document.getElementById('panelEn').textContent=b.en;
  document.getElementById('panelMeta').innerHTML=`
    <div class="panel-meta-item">&#128205; ${b.city}</div>
    <div class="panel-meta-item">&#128197; 成立 ${b.founded}</div>
    <div class="panel-meta-item">&#127760; ${b.region==='cn'?'中国':'国际'}</div>
  `;
  const lt=b.levels.map(l=>`<span class="panel-tag ${l}">${l==='consumer'?'消费级':l==='pro'?'专业级':'工业级'}</span>`).join(' ');
  const tt=b.techs.map(t=>`<span class="panel-tag tech">${t}</span>`).join('');
  document.getElementById('panelBody').innerHTML=`
    <div class="panel-section">
      <div class="panel-section-title">品牌简介</div>
      <div class="panel-desc">${b.desc}</div>
      <a href="${b.website}" target="_blank" class="official-link">&#127760; 访问官网 ${b.website}</a>
    </div>
    <div class="panel-section">
      <div class="panel-section-title">市场级别</div>
      <div class="panel-tags">${lt}</div>
    </div>
    <div class="panel-section">
      <div class="panel-section-title">核心技术</div>
      <div class="panel-tags">${tt}</div>
    </div>
    <div class="panel-section">
      <div class="panel-section-title">核心产品 (${b.products.length})</div>
      ${b.products.map(p=>`<div class="product-card"><div class="product-card-name">${p.name}</div><div class="product-card-desc">${p.d}</div></div>`).join('')}
    </div>
  `;
  document.getElementById('detailPanel').classList.add('show');
  document.getElementById('panelOverlay').classList.add('show');
}

function closePanel(){
  document.getElementById('detailPanel').classList.remove('show');
  document.getElementById('panelOverlay').classList.remove('show');
  selectedBrand=null;
}

// ===== Table =====
function renderTable(){
  let filtered=brands.filter(b=>isVisible(b));
  
  if(sortBy==='name')filtered.sort((a,b)=>a.name.localeCompare(b.name,'zh-CN'));
  else if(sortBy==='city')filtered.sort((a,b)=>a.city.localeCompare(b.city,'zh-CN'));
  else if(sortBy==='level')filtered.sort((a,b)=>{
    const order={industrial:1,pro:2,consumer:3};
    return(order[a.levels[0]]||4)-(order[b.levels[0]]||4);
  });
  
  const cn=filtered.filter(b=>b.region==='cn');
  const intl=filtered.filter(b=>b.region!=='cn');
  
  function row(b){
    const lt=b.levels.map(l=>`<span class="level level-${l}">${l==='consumer'?'消费级':l==='pro'?'专业级':'工业级'}</span>`).join(' ');
    const tt=b.techs.map(t=>{
      const c=t.toLowerCase().replace(/\s/g,'');
      if(['fff','fdm','cff','bfp','lfm','ebm','3d扫描','uv'].includes(c))return`<span class="tag tag-fff">${t}</span>`;
      if(['sla','mjp'].includes(c))return`<span class="tag tag-sla">${t}</span>`;
      if(['slm'].includes(c))return`<span class="tag tag-slm">${t}</span>`;
      if(['sls','saf','bmd'].includes(c))return`<span class="tag tag-sls">${t}</span>`;
      if(['polyjet'].includes(c))return`<span class="tag tag-pj">${t}</span>`;
      if(['dlp'].includes(c))return`<span class="tag tag-dlp">${t}</span>`;
      return`<span class="tag tag-fdm">${t}</span>`;
    }).join(' ');
    const pi=b.products.map(p=>`<span class="product-item">${p.name}</span>`).join('');
    return`<tr data-id="${b.id}" class="fade-in"><td><div class="brand-cell"><div class="brand-icon" style="background:linear-gradient(135deg,${b.color},${b.color}dd)">&#9679;</div><div><div class="brand-name">${b.name}</div><div class="brand-en">${b.en} · 成立于${b.founded}</div></div></div></td><td><div class="city">${b.city}</div></td><td>${lt}</td><td><div style="display:flex;flex-wrap:wrap;gap:6px">${tt}</div></td><td><div class="product-list">${pi}</div></td></tr>`;
  }
  
  let html='';
  if(cn.length>0){
    html+=`<div class="section" style="margin-bottom:36px"><div style="font-size:1.3rem;font-weight:600;margin-bottom:16px;padding-left:14px;border-left:4px solid #f59e0b">中国品牌 <span style="font-size:.7rem;padding:2px 10px;border-radius:20px;background:rgba(245,158,11,0.15);color:#fbbf24;font-weight:500">${cn.length} brands</span></div><div class="table-wrap"><table><thead><tr><th data-sort="name">Brand</th><th data-sort="city">Location</th><th>Level</th><th>Technology</th><th>Core Products</th></tr></thead><tbody>${cn.map(row).join('')}</tbody></table></div></div>`;
  }
  if(intl.length>0){
    html+=`<div class="section"><div style="font-size:1.3rem;font-weight:600;margin-bottom:16px;padding-left:14px;border-left:4px solid #3b82f6">国际品牌 <span style="font-size:.7rem;padding:2px 10px;border-radius:20px;background:rgba(59,130,246,0.15);color:#60a5fa;font-weight:500">${intl.length} brands</span></div><div class="table-wrap"><table><thead><tr><th data-sort="name">Brand</th><th data-sort="city">Location</th><th>Level</th><th>Technology</th><th>Core Products</th></tr></thead><tbody>${intl.map(row).join('')}</tbody></table></div></div>`;
  }
  
  document.getElementById('tableContent').innerHTML=html;
  
  document.querySelectorAll('#tableContent tbody tr').forEach(tr=>{
    tr.addEventListener('click',()=>{
      const b=brands.find(x=>x.id===tr.dataset.id);
      if(b)showDetail(b);
    });
  });
  
  updateResultCount();
  updateStats();
  updateFilterCountBadges();
}

// ===== Event Listeners =====
document.querySelectorAll('.filter-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    const f=btn.dataset.filter,v=btn.dataset.value;
    activeFilters[f]=v;
    document.querySelectorAll(`.filter-btn[data-filter="${f}"]`).forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    applyFilters();
  });
});

document.getElementById('searchInput').addEventListener('input',e=>{
  searchQuery=e.target.value;
  applyFilters();
});

document.querySelectorAll('.sort-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    const s=btn.dataset.sort;
    sortBy=s;
    document.querySelectorAll('.sort-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    renderTable();
  });
});

document.getElementById('clearFilters').addEventListener('click',()=>{
  activeFilters={region:'all',level:'all'};
  searchQuery='';
  document.getElementById('searchInput').value='';
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.filter-btn[data-value="all"]').forEach(b=>b.classList.add('active'));
  renderTable();
});

document.getElementById('panelClose').addEventListener('click',closePanel);
document.getElementById('panelOverlay').addEventListener('click',closePanel);
document.addEventListener('keydown',e=>{if(e.key==='Escape')closePanel();});

// ===== Init =====
renderTable();
</script>
</body>
</html>
