*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;background:#0a1628;color:#e2e8f0;line-height:1.6;overflow-x:hidden}
html{scroll-behavior:smooth}

/* ===== 返回首页 ===== */
.back-link{position:fixed;top:16px;left:16px;z-index:200;display:flex;align-items:center;gap:6px;padding:8px 16px;border-radius:20px;background:rgba(15,23,42,0.85);border:1px solid #334155;color:#94a3b8;font-size:13px;font-weight:500;text-decoration:none;backdrop-filter:blur(8px);transition:all .2s}
.back-link:hover{border-color:#60a5fa;color:#60a5fa;background:rgba(26,115,232,0.1)}

/* ===== Hero ===== */
.hero{text-align:center;padding:50px 20px 32px;background:linear-gradient(135deg,#dc2626 0%,#b91c1c 40%,#991b1b 100%);position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 70% 40%,rgba(255,255,255,0.06),transparent 60%)}
.hero h1{font-size:2.2rem;font-weight:800;color:#fff;margin-bottom:8px;position:relative;letter-spacing:-.5px}
.hero .hero-sub{color:rgba(255,255,255,0.8);font-size:.95rem;position:relative;max-width:560px;margin:0 auto}
.hero .date-badge{display:inline-block;margin:10px auto 0;padding:6px 18px;border-radius:20px;background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.25);color:#fff;font-size:.88rem;font-weight:600;position:relative;backdrop-filter:blur(4px)}
.hero .update-time{color:rgba(255,255,255,0.55);font-size:.8rem;margin-top:12px;position:relative}

/* ===== Stats Bar ===== */
.stats-bar{display:flex;justify-content:center;gap:40px;padding:18px 20px;background:rgba(15,23,42,0.92);border-bottom:1px solid #1e293b;backdrop-filter:blur(12px);flex-wrap:wrap}
.stat-item{text-align:center}
.stat-value{font-size:2rem;font-weight:800;color:#f87171;line-height:1}
.stat-label{font-size:.75rem;color:#64748b;margin-top:4px;letter-spacing:.5px}

/* ===== Filters ===== */
.filters{display:flex;align-items:center;gap:10px;padding:14px 24px;background:rgba(15,23,42,0.8);border-bottom:1px solid #1e293b;flex-wrap:wrap;position:sticky;top:0;z-index:50;backdrop-filter:blur(12px)}
.filter-label{font-size:.78rem;color:#64748b;font-weight:600;margin-right:4px}
.filter-btn{padding:5px 14px;border-radius:20px;font-size:.78rem;font-weight:500;border:1px solid #334155;background:transparent;color:#94a3b8;cursor:pointer;transition:all .25s}
.filter-btn:hover{border-color:#475569;color:#e2e8f0;background:rgba(255,255,255,0.05)}
.filter-btn.active{background:rgba(239,68,68,0.15);border-color:#ef4444;color:#f87171;box-shadow:0 0 12px rgba(239,68,68,0.15)}
.filter-divider{width:1px;height:20px;background:#1e293b}

/* ===== Brand Grid ===== */
.brand-grid{max-width:1400px;margin:0 auto;padding:24px;display:grid;grid-template-columns:repeat(auto-fill,minmax(620px,1fr));gap:20px}

/* ===== Brand Card ===== */
.brand-card{background:#111827;border-radius:16px;border:1px solid #1e293b;overflow:hidden;transition:all .3s;animation:fadeIn .5s ease-out}
.brand-card:hover{border-color:#334155;box-shadow:0 4px 24px rgba(0,0,0,0.3);transform:translateY(-2px)}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* Card Header */
.card-header{display:flex;align-items:center;gap:14px;padding:18px 20px;border-bottom:1px solid #1e293b;background:rgba(255,255,255,0.02)}
.brand-logo{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.brand-info{flex:1}
.brand-name{font-size:1.1rem;font-weight:700;color:#f1f5f9;line-height:1.2}
.brand-name-en{font-size:.78rem;color:#64748b;margin-top:2px}
.brand-count{display:flex;align-items:center;gap:6px;font-size:.8rem;color:#f87171;font-weight:600}
.brand-count .count-num{font-size:1.3rem;font-weight:800}

.complaint-list{padding:8px 0}
.complaint-item{display:flex;gap:12px;padding:14px 20px;border-bottom:1px solid rgba(30,41,59,0.6);transition:background .15s}

.complaint-item:hover{background:rgba(255,255,255,0.02)}
.complaint-left{flex-shrink:0;padding-top:2px}

.complaint-title{font-size:.88rem;font-weight:600;color:#e2e8f0;line-height:1.4;margin-bottom:4px;display:flex;align-items:flex-start;gap:6px}
.complaint-title a{color:#e2e8f0;text-decoration:none;transition:color .15s}
.complaint-title a:hover{color:#60a5fa}
.complaint-summary{font-size:.8rem;color:#94a3b8;line-height:1.6;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.complaint-meta{display:flex;align-items:center;gap:8px;margin-top:6px;font-size:.72rem;color:#4b5563}
.complaint-date{display:flex;align-items:center;gap:3px}
.complaint-heat{display:flex;align-items:center;gap:3px;color:#fbbf24}

.card-footer{padding:10px 20px;border-top:1px solid #1e293b;text-align:right}
.card-footer a{font-size:.78rem;color:#60a5fa;text-decoration:none;transition:color .15s}
.card-footer a:hover{color:#93bbfd;text-decoration:underline}

.empty-state{text-align:center;padding:80px 20px;color:#4b5563}
.empty-state .empty-icon{font-size:4rem;margin-bottom:16px;opacity:.5}
.empty-state .empty-text{font-size:1rem;font-weight:600;margin-bottom:8px;color:#64748b}
.empty-state .empty-sub{font-size:.85rem}

.footer a:hover{text-decoration:underline}

@media(max-width:768px){
  .brand-grid{grid-template-columns:1fr;padding:16px}

  "Creality":     { emoji: "🟦", bg: "rgba(37,99,235,0.12)",  border: "rgba(37,99,235,0.25)" },
  "Bambu Lab":    { emoji: "🟩", bg: "rgba(22,163,74,0.12)",  border: "rgba(22,163,74,0.25)" },
  "ELEGOO":       { emoji: "🟧", bg: "rgba(234,88,12,0.12)",  border: "rgba(234,88,12,0.25)" },
  "Anycubic":     { emoji: "🟪", bg: "rgba(147,51,234,0.12)", border: "rgba(147,51,234,0.25)" },
  "Prusa":        { emoji: "🟨", bg: "rgba(202,138,4,0.12)",  border: "rgba(202,138,4,0.25)" },

  "Flashforge":   { emoji: "⬜", bg: "rgba(100,116,139,0.12)", border: "rgba(100,116,139,0.25)" },
  "Sovol":        { emoji: "🔷", bg: "rgba(6,182,212,0.12)",  border: "rgba(6,182,212,0.25)" },
  "QIDI":         { emoji: "🟢", bg: "rgba(21,128,61,0.12)",  border: "rgba(21,128,61,0.25)" },
  "Voxelab":      { emoji: "🟠", bg: "rgba(249,115,22,0.12)", border: "rgba(249,115,22,0.25)" }
};

const PLATFORM_MAP = {
  "知乎":   "platform-zhihu",
  "贴吧":   "platform-tieba",
  "B站":    "platform-bilibili",
  "抖音":   "platform-douyin",
  "Reddit": "platform-reddit",
  "Twitter":"platform-twitter",
  "淘宝":   "platform-taobao",
  "京东":   "platform-jd",
  "YouTube":"platform-youtube"
};

// ===== 渲染 =====
function renderPage() {
  const data = COMPLAINTS_DATA;

  // Date badge
  document.getElementById('dateBadge').textContent = '📅 ' + (data.dateLabel || data.date);

  // Update time
  document.getElementById('updateTime').textContent = '最近更新：' + data.date;

  // Stats
  document.getElementById('statTotal').textContent = data.stats.total;
  document.getElementById('statBrands').textContent = data.stats.brands;
  document.getElementById('statPlatforms').textContent = data.stats.platforms;
  document.getElementById('statToday').textContent = data.stats.today;

  if (data.brands.length === 0) {
    document.getElementById('emptyState').style.display = 'block';
    return;
  }

  // Filters
  const filterBar = document.getElementById('filterBar');
  data.brands.forEach(b => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.dataset.brand = b.name;
    btn.textContent = b.name;
    btn.onclick = function() { filterBrand(b.name, this); };
    filterBar.appendChild(btn);
  });

  // Brand cards
  const grid = document.getElementById('brandGrid');
  grid.innerHTML = '';
  data.brands.forEach(brand => {
    const style = BRAND_STYLES[brand.name] || { emoji: "⬜", bg: "rgba(100,116,139,0.12)", border: "rgba(100,116,139,0.25)" };
    const card = document.createElement('div');
    card.className = 'brand-card';
    card.dataset.brand = brand.name;

    card.innerHTML = `
      <div class="card-header">
        <div class="brand-logo" style="background:${style.bg};border:1.5px solid ${style.border}">${style.emoji}</div>
        <div class="brand-info">
          <div class="brand-name">${brand.name}</div>
          <div class="brand-name-en">${brand.nameEn || ''}</div>
        </div>
        <div class="brand-count">
          <span class="count-num">${brand.complaints.length}</span>
          <span>条吐槽</span>
        </div>
      </div>
      <div class="complaint-list">
        ${brand.complaints.map(c => `
          <div class="complaint-item">
            <div class="complaint-left">
              <span class="platform-tag ${PLATFORM_MAP[c.platform] || ''}">${c.platform}</span>
            </div>
            <div class="complaint-body">
              <div class="complaint-title">
                ${c.url ? `<a href="${c.url}" target="_blank">${c.title}</a>` : c.title}
              </div>
              <div class="complaint-summary">${c.summary}</div>
              <div class="complaint-meta">
                <span class="complaint-date">📅 ${c.date}</span>
                ${c.heat ? `<span class="complaint-heat">🔥 ${c.heat}</span>` : ''}
              </div>
            </div>
          </div>
        `).join('')}
      </div>
      ${brand.sourceUrl ? `<div class="card-footer"><a href="${brand.sourceUrl}" target="_blank">查看更多 →</a></div>` : ''}
    `;
    grid.appendChild(card);
  });
}

// ===== Filter =====
function filterBrand(brand, btn) {
  // Update buttons
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  // Filter cards
  const cards = document.querySelectorAll('.brand-card');
  cards.forEach(card => {
    if (brand === 'all' || card.dataset.brand === brand) {
      card.style.display = '';
    } else {
      card.style.display = 'none';
    }
  });
}

// Init
renderPage();
