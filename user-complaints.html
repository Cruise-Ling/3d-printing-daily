<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>用户点评 - 3D打印每日速递</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🖨️</text></svg>">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;background:#0a1628;color:#e2e8f0;line-height:1.6;overflow-x:hidden}
html{scroll-behavior:smooth}
a{color:#60a5fa;text-decoration:none;transition:color .15s}
a:hover{color:#93bbfd;text-decoration:underline}

/* Back */
.back-link{position:fixed;top:16px;left:16px;z-index:200;display:flex;align-items:center;gap:6px;padding:8px 16px;border-radius:20px;background:rgba(15,23,42,0.85);border:1px solid #334155;color:#94a3b8;font-size:13px;font-weight:500;text-decoration:none;backdrop-filter:blur(8px);transition:all .2s}
.back-link:hover{border-color:#60a5fa;color:#60a5fa;background:rgba(26,115,232,0.1)}

/* Hero */
.hero{text-align:center;padding:44px 20px 28px;background:linear-gradient(135deg,#1e3a5f 0%,#0f2847 50%,#0a1628 100%);position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 30% 40%,rgba(59,130,246,0.08),transparent 60%)}
.hero h1{font-size:2rem;font-weight:800;color:#fff;margin-bottom:4px;position:relative}
.hero .hero-sub{color:rgba(255,255,255,0.7);font-size:.9rem;position:relative;max-width:580px;margin:0 auto}
.hero .date-row{display:flex;justify-content:center;align-items:center;gap:12px;margin-top:12px;position:relative;flex-wrap:wrap}
.hero .date-badge{padding:5px 16px;border-radius:16px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.18);color:#fff;font-size:.82rem;font-weight:600;backdrop-filter:blur(4px)}
.hero .hero-date-select{padding:5px 16px;border-radius:16px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.18);color:#fff;font-size:.82rem;font-weight:600;outline:none;font-family:inherit;backdrop-filter:blur(4px);cursor:pointer;max-width:220px;appearance:none;-webkit-appearance:none;background-image:url(\"data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8'><path d='M1 1l5 5 5-5' stroke='white' stroke-width='1.5' fill='none'/></svg>\");background-repeat:no-repeat;background-position:right 12px center;padding-right:32px}
.hero .hero-date-select option{background:#0f2847;color:#e2e8f0;font-size:.82rem}
.hero .hero-date-select:focus{border-color:rgba(255,255,255,0.35)}
.hero .update-time{color:rgba(255,255,255,0.45);font-size:.78rem}

/* Stats */
.stats-bar{display:flex;justify-content:center;gap:32px;padding:16px 20px;background:rgba(15,23,42,0.92);border-bottom:1px solid #1e293b;backdrop-filter:blur(12px);flex-wrap:wrap}
.stat-item{text-align:center}
.stat-value{font-size:1.8rem;font-weight:800;line-height:1}
.stat-value.text-red{color:#f87171}
.stat-value.text-amber{color:#fbbf24}
.stat-value.text-green{color:#34d399}
.stat-value.text-blue{color:#60a5fa}
.stat-value.text-purple{color:#a78bfa}
.stat-label{font-size:.72rem;color:#64748b;margin-top:3px;letter-spacing:.3px}

/* Filter Section */
.filter-section{background:rgba(15,23,42,0.8);border-bottom:1px solid #1e293b;position:sticky;top:0;z-index:50;backdrop-filter:blur(12px)}

/* Search Row */
.search-row{display:flex;align-items:center;gap:10px;padding:12px 24px;border-bottom:1px solid rgba(30,41,59,0.5)}
.search-box{flex:1;position:relative;max-width:480px}
.search-box input{width:100%;padding:8px 14px 8px 36px;border-radius:10px;border:1px solid #334155;background:rgba(0,0,0,0.3);color:#e2e8f0;font-size:.85rem;outline:none;transition:border-color .2s}
.search-box input::placeholder{color:#4b5563}
.search-box input:focus{border-color:#3b82f6}
.search-box .search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:#4b5563;font-size:.85rem}
.search-clear{padding:6px 14px;border-radius:8px;border:1px solid #334155;background:transparent;color:#64748b;font-size:.78rem;cursor:pointer;transition:all .15s;white-space:nowrap}
.search-clear:hover{border-color:#475569;color:#e2e8f0}
.search-result-hint{font-size:.72rem;color:#4b5563;margin-left:auto;white-space:nowrap}

/* Filter Row */
.filter-row{display:flex;align-items:center;gap:8px;padding:10px 24px;border-bottom:1px solid rgba(30,41,59,0.5);flex-wrap:wrap}
.filter-label{font-size:.72rem;color:#64748b;font-weight:600;margin-right:2px;white-space:nowrap}
.filter-btn{padding:4px 12px;border-radius:16px;font-size:.75rem;font-weight:500;border:1px solid #334155;background:transparent;color:#94a3b8;cursor:pointer;transition:all .2s;white-space:nowrap}
.filter-btn:hover{border-color:#475569;color:#e2e8f0}
.filter-btn.active{background:rgba(59,130,246,0.15);border-color:#3b82f6;color:#60a5fa}
.filter-btn .count{font-size:.65rem;opacity:.7;margin-left:2px}
.filter-divider{width:1px;height:18px;background:#1e293b;flex-shrink:0}

/* Brand scroll */
.brand-scroll{display:flex;gap:6px;overflow-x:auto;padding:2px 0;scrollbar-width:none;-ms-overflow-style:none;flex:1}
.brand-scroll::-webkit-scrollbar{display:none}

/* Date inputs */
.date-input-group{display:flex;align-items:center;gap:6px}
.date-input-group input[type="date"]{padding:4px 8px;border-radius:8px;border:1px solid #334155;background:rgba(0,0,0,0.3);color:#94a3b8;font-size:.72rem;outline:none;font-family:inherit}
.date-input-group input[type="date"]::-webkit-calendar-picker-indicator{filter:invert(0.6)}
.date-input-group input[type="date"]:focus{border-color:#3b82f6}
.date-arrow{color:#4b5563;font-size:.75rem}

/* Feed Container */
.feed{max-width:860px;margin:0 auto;padding:20px 16px}

/* Feed Card */
.feed-card{background:#111827;border-radius:14px;border:1px solid #1e293b;margin-bottom:16px;overflow:hidden;transition:all .25s;animation:fadeIn .4s ease-out}
.feed-card:hover{border-color:#334155;box-shadow:0 4px 20px rgba(0,0,0,0.3);transform:translateY(-1px)}
.feed-card.p0-card{border-left:3px solid #ef4444}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* Date Group Header */
.date-group-header{display:flex;align-items:center;gap:10px;margin:28px 0 12px;padding-bottom:8px;border-bottom:1px solid rgba(30,41,59,0.5)}
.date-group-header:first-child{margin-top:0}
.date-group-label{font-size:.85rem;font-weight:700;color:#60a5fa;white-space:nowrap}
.date-group-count{font-size:.7rem;color:#4b5563;background:rgba(59,130,246,0.08);padding:2px 8px;border-radius:10px}

/* Card Header */
.card-top{display:flex;align-items:center;gap:10px;padding:14px 18px 0;flex-wrap:wrap}
.platform-tag{display:inline-flex;align-items:center;gap:4px;padding:2px 10px;border-radius:6px;font-size:.7rem;font-weight:600;white-space:nowrap}
.plat-reddit{background:rgba(249,115,22,0.15);color:#fb923c;border:1px solid rgba(249,115,22,0.25)}
.plat-youtube{background:rgba(239,68,68,0.15);color:#f87171;border:1px solid rgba(239,68,68,0.25)}
.plat-amazon{background:rgba(234,179,8,0.15);color:#fbbf24;border:1px solid rgba(234,179,8,0.25)}
.plat-facebook{background:rgba(59,130,246,0.15);color:#60a5fa;border:1px solid rgba(59,130,246,0.25)}
.plat-other{background:rgba(100,116,139,0.15);color:#94a3b8;border:1px solid rgba(100,116,139,0.25)}
.plat-review{background:rgba(16,185,129,0.15);color:#34d399;border:1px solid rgba(16,185,129,0.25)}
.plat-forum{background:rgba(139,92,246,0.15);color:#a78bfa;border:1px solid rgba(139,92,246,0.25)}
.brand-tag{padding:2px 8px;border-radius:6px;font-size:.68rem;font-weight:600;background:rgba(16,185,129,0.12);color:#34d399;border:1px solid rgba(16,185,129,0.2)}
.model-tag{padding:2px 8px;border-radius:6px;font-size:.68rem;font-weight:600;background:rgba(139,92,246,0.12);color:#a78bfa;border:1px solid rgba(139,92,246,0.2)}
.country-tag{font-size:.68rem;color:#64748b;display:flex;align-items:center;gap:2px}
.verified-badge{font-size:.65rem;color:#34d399;font-weight:600;display:flex;align-items:center;gap:2px}
.p0-badge{font-size:.65rem;color:#f87171;font-weight:700;background:rgba(239,68,68,0.12);padding:2px 8px;border-radius:4px;border:1px solid rgba(239,68,68,0.25);animation:p0pulse 2s infinite}
@keyframes p0pulse{0%,100%{opacity:1}50%{opacity:.6}}

/* Card Body */
.card-body{padding:12px 18px 14px}
.card-summary{font-size:.88rem;color:#e2e8f0;line-height:1.7;margin-bottom:8px}
.card-original{background:rgba(0,0,0,0.25);border-radius:8px;padding:10px 14px;margin-bottom:10px;border-left:3px solid #334155}
.card-original .label{font-size:.68rem;color:#64748b;font-weight:600;margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
.card-original .text{font-size:.82rem;color:#94a3b8;line-height:1.7;font-style:italic}
.card-translation{background:rgba(59,130,246,0.06);border-radius:8px;padding:10px 14px;border-left:3px solid rgba(59,130,246,0.3)}
.card-translation .label{font-size:.68rem;color:#3b82f6;font-weight:600;margin-bottom:4px;letter-spacing:.5px}
.card-translation .text{font-size:.82rem;color:#cbd5e1;line-height:1.7}

/* Sentiment Badge */
.sentiment-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 10px;border-radius:12px;font-size:.7rem;font-weight:600}
.sent-very-negative{background:rgba(239,68,68,0.15);color:#f87171;border:1px solid rgba(239,68,68,0.25)}
.sent-negative{background:rgba(251,146,60,0.15);color:#fb923c;border:1px solid rgba(251,146,60,0.25)}
.sent-neutral{background:rgba(148,163,184,0.15);color:#94a3b8;border:1px solid rgba(148,163,184,0.25)}
.sent-positive{background:rgba(52,211,153,0.15);color:#34d399;border:1px solid rgba(52,211,153,0.25)}
.sent-very-positive{background:rgba(34,197,94,0.15);color:#22c55e;border:1px solid rgba(34,197,94,0.25)}

/* Tags Row */
.tags-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.dim-tag{padding:2px 8px;border-radius:4px;font-size:.65rem;font-weight:500;background:rgba(99,102,241,0.1);color:#818cf8;border:1px solid rgba(99,102,241,0.15)}
.problem-tag{padding:2px 8px;border-radius:4px;font-size:.65rem;font-weight:500;background:rgba(239,68,68,0.08);color:#fca5a5;border:1px solid rgba(239,68,68,0.12)}
.competitor-tag{padding:2px 8px;border-radius:4px;font-size:.65rem;font-weight:500;background:rgba(234,179,8,0.08);color:#fde68a;border:1px solid rgba(234,179,8,0.12)}

/* Card Footer */
.card-footer{display:flex;align-items:center;justify-content:space-between;padding:8px 18px 12px;flex-wrap:wrap;gap:6px}
.card-footer .meta{display:flex;align-items:center;gap:10px;font-size:.7rem;color:#4b5563}
.card-footer .meta span{display:flex;align-items:center;gap:3px}
.card-footer .heat{color:#fbbf24}
.card-footer .link-btn{padding:4px 12px;border-radius:8px;font-size:.72rem;font-weight:500;background:rgba(59,130,246,0.1);color:#60a5fa;border:1px solid rgba(59,130,246,0.2);transition:all .15s;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:4px}
.card-footer .link-btn:hover{background:rgba(59,130,246,0.2);text-decoration:none}

/* Purchase Info Row */
.purchase-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px;padding-top:8px;border-top:1px solid rgba(30,41,59,0.5)}
.purchase-item{font-size:.68rem;color:#64748b;display:flex;align-items:center;gap:3px}
.purchase-item span{color:#94a3b8;font-weight:500}

/* Empty State */
.empty-state{text-align:center;padding:80px 20px;color:#4b5563}
.empty-state .empty-icon{font-size:3.5rem;margin-bottom:16px;opacity:.5}
.empty-state .empty-text{font-size:1rem;font-weight:600;margin-bottom:6px;color:#64748b}
.empty-state .empty-sub{font-size:.85rem}

/* Footer */
.footer{text-align:center;padding:28px 20px;font-size:.75rem;color:#374151;border-top:1px solid #1e293b;margin-top:24px}
.footer a{color:#60a5fa;text-decoration:none}
.footer a:hover{text-decoration:underline}

/* Mobile */
@media(max-width:768px){
  .feed{padding:12px}
  .hero h1{font-size:1.5rem}
  .hero .hero-sub{font-size:.82rem}
  .stats-bar{gap:16px;padding:12px 16px}
  .stat-value{font-size:1.4rem}
  .search-row{padding:10px 14px}
  .search-box input{font-size:.8rem;padding:7px 12px 7px 32px}
  .filter-row{padding:8px 14px}
  .filter-btn{padding:3px 9px;font-size:.7rem}
  .date-input-group input[type="date"]{font-size:.65rem}
  .card-top{padding:10px 14px 0}
  .card-body{padding:10px 14px 12px}
  .card-footer{padding:6px 14px 10px}
  .back-link{top:auto;bottom:14px;left:14px;font-size:11px;padding:5px 10px}
  .date-group-header{margin:20px 0 10px}
}
</style>
</head>
<body>

<a class="back-link" href="index.html">← 首页</a>

<div class="hero">
  <h1>🌍 海外用户点评</h1>
  <div class="hero-sub">每日 5 条高价值精准样本 · 覆盖 Reddit / YouTube / Amazon 等主流平台 · 支持品牌/日期/关键词筛选</div>
  <div class="date-row">
    <select id="heroDateFilter" class="hero-date-select" onchange="filterByHeroDate(this.value)">
      <option value="">📅 全部日期</option>
    </select>
    <span class="update-time" id="updateTime"></span>
  </div>
</div>

<div class="stats-bar">
  <div class="stat-item">
    <div class="stat-value text-blue" id="statTotal">-</div>
    <div class="stat-label" id="statTotalLabel">累计样本</div>
  </div>
  <div class="stat-item">
    <div class="stat-value text-red" id="statNegative">-</div>
    <div class="stat-label">负面反馈</div>
  </div>
  <div class="stat-item">
    <div class="stat-value text-amber" id="statNeutral">-</div>
    <div class="stat-label">中性反馈</div>
  </div>
  <div class="stat-item">
    <div class="stat-value text-green" id="statPositive">-</div>
    <div class="stat-label">正面反馈</div>
  </div>
  <div class="stat-item">
    <div class="stat-value text-purple" id="statP0">-</div>
    <div class="stat-label">P0 高风险</div>
  </div>
</div>

<!-- Filter Section -->
<div class="filter-section">
  <!-- Search Row -->
  <div class="search-row">
    <div class="search-box">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="搜索机型、品牌、问题关键词..." oninput="applyFilters()">
    </div>
    <button class="search-clear" onclick="clearAllFilters()">清空筛选</button>
    <span class="search-result-hint" id="resultHint"></span>
  </div>
  <!-- Brand Row -->
  <div class="filter-row">
    <span class="filter-label">品牌：</span>
    <div class="brand-scroll" id="brandScroll"></div>
  </div>
  <!-- Sentiment + Platform Row -->
  <div class="filter-row">
    <span class="filter-label">情感：</span>
    <button class="filter-btn active" data-group="sentiment" data-value="all" onclick="toggleFilter(this)">全部</button>
    <button class="filter-btn" data-group="sentiment" data-value="negative" onclick="toggleFilter(this)">😔 负面</button>
    <button class="filter-btn" data-group="sentiment" data-value="neutral" onclick="toggleFilter(this)">😐 中性</button>
    <button class="filter-btn" data-group="sentiment" data-value="positive" onclick="toggleFilter(this)">😊 正面</button>
    <span class="filter-divider"></span>
    <span class="filter-label">平台：</span>
    <button class="filter-btn active" data-group="platform" data-value="all" onclick="toggleFilter(this)">全部</button>
    <button class="filter-btn" data-group="platform" data-value="Reddit" onclick="toggleFilter(this)">Reddit</button>
    <button class="filter-btn" data-group="platform" data-value="YouTube" onclick="toggleFilter(this)">YouTube</button>
    <button class="filter-btn" data-group="platform" data-value="Amazon" onclick="toggleFilter(this)">Amazon</button>
    <button class="filter-btn" data-group="platform" data-value="Facebook" onclick="toggleFilter(this)">Facebook</button>
    <button class="filter-btn" data-group="platform" data-value="独立评测" onclick="toggleFilter(this)">独立评测</button>
    <button class="filter-btn" data-group="platform" data-value="在线论坛" onclick="toggleFilter(this)">在线论坛</button>
  </div>
  <!-- Date Row -->
  <div class="filter-row">
    <span class="filter-label">日期：</span>
    <button class="filter-btn active" data-group="date" data-value="all" onclick="toggleDateFilter(this)">全部</button>
    <button class="filter-btn" data-group="date" data-value="7" onclick="toggleDateFilter(this)">近 7 天</button>
    <button class="filter-btn" data-group="date" data-value="30" onclick="toggleDateFilter(this)">近 30 天</button>
    <span class="filter-divider"></span>
    <div class="date-input-group">
      <input type="date" id="dateFrom" onchange="applyDateRange()">
      <span class="date-arrow">→</span>
      <input type="date" id="dateTo" onchange="applyDateRange()">
    </div>
  </div>
</div>

<div class="feed" id="feedContainer"></div>

<div class="empty-state" id="emptyState" style="display:none">
  <div class="empty-icon">🔍</div>
  <div class="empty-text">暂无匹配的用户点评数据</div>
  <div class="empty-sub">尝试调整筛选条件</div>
</div>

<div class="footer">
  <p>数据来源：Reddit · YouTube · Amazon · Facebook · 专业论坛</p>
  <p style="margin-top:3px">by <a href="https://github.com/Cruise-Ling" target="_blank">Cruise</a> · <a href="index.html">3D打印每日速递</a> · 每日 5 条精准样本</p>
</div>

// Filter state
let filters = {
  brand: "all",
  sentiment: "all",
  platform: "all",
  datePreset: "all",
  dateFrom: "",
  dateTo: "",
  search: ""
};

// ---- Brand buttons (dynamic) ----
function buildBrandButtons() {
  const brandCounts = {};
  OVERSEAS_FEEDBACK_DATA.items.forEach(item => {
    const b = item.brand || "其他";
    brandCounts[b] = (brandCounts[b] || 0) + 1;
  });
  const sorted = Object.entries(brandCounts).sort((a, b) => b[1] - a[1]);
  const container = document.getElementById('brandScroll');
  container.innerHTML = '<button class="filter-btn active" data-group="brand" data-value="all" onclick="toggleFilter(this)">全部 <span class="count">(' + OVERSEAS_FEEDBACK_DATA.items.length + ')</span></button>';
  sorted.forEach(([brand, count]) => {
    container.innerHTML += '<button class="filter-btn" data-group="brand" data-value="' + brand + '" onclick="toggleFilter(this)">' + brand + ' <span class="count">(' + count + ')</span></button>';
  });
}

// ---- Toggle filter button ----
function toggleFilter(btn) {
  const group = btn.dataset.group;
  const value = btn.dataset.value;
  // Deactivate siblings
  btn.parentElement.querySelectorAll('.filter-btn[data-group="' + group + '"]').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  filters[group] = value;
  // Clear date range inputs if preset selected
  if (group === 'date' && value !== 'custom') {
    filters.dateFrom = '';
    filters.dateTo = '';
    document.getElementById('dateFrom').value = '';
    document.getElementById('dateTo').value = '';
  }
  applyFilters();
}

function toggleDateFilter(btn) {
  const value = btn.dataset.value;
  btn.parentElement.querySelectorAll('.filter-btn[data-group="date"]').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  filters.datePreset = value;
  if (value !== 'custom') {
    filters.dateFrom = '';
    filters.dateTo = '';
    document.getElementById('dateFrom').value = '';
    document.getElementById('dateTo').value = '';
  }
  // Reset hero date dropdown when bottom filter changes
  if (value === 'all') {
    const heroSel = document.getElementById('heroDateFilter');
    if (heroSel) heroSel.value = '';
  }
  applyFilters();
}

function applyDateRange() {
  const from = document.getElementById('dateFrom').value;
  const to = document.getElementById('dateTo').value;
  // Deactivate preset buttons
  document.querySelectorAll('.filter-btn[data-group="date"]').forEach(b => b.classList.remove('active'));
  if (from || to) {
    filters.datePreset = 'custom';
    filters.dateFrom = from;
    filters.dateTo = to;
  } else {
    filters.datePreset = 'all';
    filters.dateFrom = '';
    filters.dateTo = '';
    // Re-activate "all" button
    document.querySelector('.filter-btn[data-group="date"][data-value="all"]').classList.add('active');
  }
  applyFilters();
}

function clearAllFilters() {
  filters = { brand: "all", sentiment: "all", platform: "all", datePreset: "all", dateFrom: "", dateTo: "", search: "" };
  document.getElementById('searchInput').value = '';
  document.getElementById('dateFrom').value = '';
  document.getElementById('dateTo').value = '';
  // Reset all active states
  document.querySelectorAll('.filter-btn').forEach(b => {
    if (b.dataset.value === 'all') b.classList.add('active');
    else b.classList.remove('active');
  });
  // Reset hero date dropdown
  const heroSel = document.getElementById('heroDateFilter');
  if (heroSel) heroSel.value = '';
  applyFilters();
}

// ---- Core filter logic ----
function getFilteredItems() {
  const items = OVERSEAS_FEEDBACK_DATA.items || [];
  const today = new Date(); today.setHours(23,59,59,999);
  return items.filter(item => {
    // Brand
    if (filters.brand !== "all" && item.brand !== filters.brand) return false;
    // Sentiment
    if (filters.sentiment !== "all") {
      const s = item.sentiment;
      if (filters.sentiment === 'negative' && s !== '非常负面' && s !== '负面') return false;
      if (filters.sentiment === 'neutral' && s !== '中性') return false;
      if (filters.sentiment === 'positive' && s !== '正面' && s !== '非常正面') return false;
    }
    // Platform
    if (filters.platform !== "all" && item.platform !== filters.platform) return false;
    // Date preset
    if (filters.datePreset === '7' || filters.datePreset === '30') {
      const d = new Date(item.date);
      const daysAgo = filters.datePreset === '7' ? 7 : 30;
      const cutoff = new Date(today); cutoff.setDate(cutoff.getDate() - daysAgo); cutoff.setHours(0,0,0,0);
      if (d < cutoff) return false;
    }
    // Date range
    if (filters.datePreset === 'custom') {
      if (filters.dateFrom) { const d = new Date(item.date); const from = new Date(filters.dateFrom); if (d < from) return false; }
      if (filters.dateTo) { const d = new Date(item.date); const to = new Date(filters.dateTo); to.setHours(23,59,59,999); if (d > to) return false; }
    }
    // Search
    if (filters.search) {
      const q = filters.search.toLowerCase();
      const haystack = [
        item.brand, item.modelName, item.platform, item.originalText, item.translation,
        item.summaryEn, item.summaryCn, item.competitorMentioned, item.modsMentioned,
        item.country, item.id, item.sourceLink
      ].concat(item.dimensions || []).concat(item.problemPoints || []).join(' ').toLowerCase();
      if (!haystack.includes(q)) return false;
    }
    return true;
  });
}

// ---- Render ----
function applyFilters() {
  filters.search = document.getElementById('searchInput').value.trim();
  const filtered = getFilteredItems();

  // Update stats
  let negCount = 0, neuCount = 0, posCount = 0, p0Count = 0;
  filtered.forEach(item => {
    const s = item.sentiment;
    if (s === '非常负面' || s === '负面') negCount++;
    else if (s === '中性') neuCount++;
    else posCount++;
    if (item.isP0) p0Count++;
  });
  document.getElementById('statTotal').textContent = filtered.length;
  document.getElementById('statTotalLabel').textContent = filters.search || filters.brand !== 'all' || filters.sentiment !== 'all' || filters.platform !== 'all' || filters.datePreset !== 'all' ? '筛选结果' : '累计样本';
  document.getElementById('statNegative').textContent = negCount;
  document.getElementById('statNeutral').textContent = neuCount;
  document.getElementById('statPositive').textContent = posCount;
  document.getElementById('statP0').textContent = p0Count;

  document.getElementById('resultHint').textContent = filtered.length + ' / ' + (OVERSEAS_FEEDBACK_DATA.items || []).length + ' 条';

  const feed = document.getElementById('feedContainer');
  feed.innerHTML = '';

  if (filtered.length === 0) {
    document.getElementById('emptyState').style.display = 'block';
    return;
  }
  document.getElementById('emptyState').style.display = 'none';

  // Group by date (descending)
  const groups = {};
  filtered.forEach(item => {
    const d = item.date || 'unknown';
    if (!groups[d]) groups[d] = [];
    groups[d].push(item);
  });
  const sortedDates = Object.keys(groups).sort((a, b) => b.localeCompare(a));

  sortedDates.forEach(dateStr => {
    // Date group header (scroll anchor)
    const anchor = document.createElement('div');
    anchor.id = 'date-group-' + dateStr;
    anchor.style.display = 'none';
    feed.appendChild(anchor);

    // Cards in this group, P0 first
    const sorted = groups[dateStr].sort((a, b) => (b.isP0 ? 1 : 0) - (a.isP0 ? 1 : 0));
    sorted.forEach(item => {
      const card = document.createElement('div');
      card.className = 'feed-card' + (item.isP0 ? ' p0-card' : '');
      const platClass = PLATFORM_STYLES[item.platform] || "plat-other";
      const sentClass = SENTIMENT_STYLES[item.sentiment] || "sent-neutral";
      const sentIcon = SENTIMENT_ICONS[item.sentiment] || "";

      card.innerHTML = '<div class="card-top">' +
        '<span class="platform-tag ' + platClass + '">' + item.platform + '</span>' +
        '<span class="brand-tag">' + (item.brand || '') + '</span>' +
        '<span class="model-tag">' + item.modelName + '</span>' +
        '<span class="country-tag">📍 ' + item.country + '</span>' +
        (item.verified ? '<span class="verified-badge">✓ 已验证购买</span>' : '') +
        '<span class="sentiment-badge ' + sentClass + '">' + sentIcon + ' ' + item.sentiment + '</span>' +
        (item.isP0 ? '<span class="p0-badge">🔴 P0 高风险</span>' : '') +
        '</div>' +
        '<div class="card-body">' +
        '<div class="card-summary">' + item.summaryCn + '</div>' +
        (item.purchaseChannel && item.purchaseChannel !== '其他' ?
          '<div class="purchase-row">' +
          '<div class="purchase-item">📦 购买渠道：<span>' + item.purchaseChannel + '</span></div>' +
          '<div class="purchase-item">⏱ 使用时长：<span>' + item.purchaseDuration + '</span></div>' +
          (item.shippingExperience !== '未提及' ? '<div class="purchase-item">🚚 运输：<span>' + item.shippingExperience + '</span></div>' : '') +
          (item.customs !== '未提及' ? '<div class="purchase-item">🛃 清关：<span>' + item.customs + '</span></div>' : '') +
          '</div>' : '') +
        '<div class="card-original"><div class="label">📝 Original (EN)</div><div class="text">' + item.originalText + '</div></div>' +
        '<div class="card-translation"><div class="label">🌐 中文翻译</div><div class="text">' + item.translation + '</div></div>' +
        '<div class="tags-row">' +
        (item.dimensions || []).map(d => '<span class="dim-tag">' + d + '</span>').join('') +
        (item.problemPoints || []).map(p => '<span class="problem-tag">⚠ ' + p + '</span>').join('') +
        (item.competitorMentioned ? '<span class="competitor-tag">🔄 ' + item.competitorMentioned + '</span>' : '') +
        '</div></div>' +
        '<div class="card-footer"><div class="meta">' +
        '<span>📅 ' + item.publishedAt + '</span>' +
        '<span class="heat">🔥 ' + item.heat + '</span>' +
        '<span>🔒 ' + item.id + '</span>' +
        '</div><a class="link-btn" href="' + item.sourceLink + '" target="_blank" rel="noopener">查看原文 ↗</a></div>';
      feed.appendChild(card);
    });
  });

  // Build hero date filter dropdown
  buildHeroDateDropdown(sortedDates);
}

// ---- Hero date filter dropdown ----
function buildHeroDateDropdown(dates) {
  const sel = document.getElementById('heroDateFilter');
  if (!sel) return;
  const currentVal = sel.value;
  sel.innerHTML = '<option value="">📅 全部日期</option>';
  dates.forEach(dateStr => {
    const dateObj = new Date(dateStr);
    const weekDays = ['日','一','二','三','四','五','六'];
    const label = dateStr.replace(/-/g, '.') + ' 周' + weekDays[dateObj.getDay()];
    sel.innerHTML += '<option value="' + dateStr + '">📅 ' + label + '</option>';
  });
  if (currentVal && dates.includes(currentVal)) sel.value = currentVal;
}

function filterByHeroDate(dateStr) {
  if (!dateStr) {
    // "全部日期" — reset
    filters.datePreset = 'all';
    filters.dateFrom = '';
    filters.dateTo = '';
    // Reactivate bottom date "all" button
    document.querySelectorAll('.filter-btn[data-group="date"]').forEach(b => b.classList.remove('active'));
    const allBtn = document.querySelector('.filter-btn[data-group="date"][data-value="all"]');
    if (allBtn) allBtn.classList.add('active');
    document.getElementById('dateFrom').value = '';
    document.getElementById('dateTo').value = '';
  } else {
    // Specific date selected
    filters.datePreset = 'custom';
    filters.dateFrom = dateStr;
    filters.dateTo = dateStr;
    // Deactivate bottom date buttons
    document.querySelectorAll('.filter-btn[data-group="date"]').forEach(b => b.classList.remove('active'));
    document.getElementById('dateFrom').value = dateStr;
    document.getElementById('dateTo').value = dateStr;
  }
  applyFilters();
}

// ---- Init ----
function renderPage() {
  const items = OVERSEAS_FEEDBACK_DATA.items || [];
  console.log('[OverseasFeedback] renderPage start, items:', items.length);
  
  if (items.length === 0) {
    console.log('[OverseasFeedback] No items found!');
    document.getElementById('heroDateFilter').innerHTML = '<option value="">📅 暂无数据</option>';
    document.getElementById('updateTime').textContent = '';
    document.getElementById('emptyState').style.display = 'block';
    document.getElementById('statTotalLabel').textContent = '累计样本';
    buildBrandButtons();
    applyFilters();
    return;
  }

  // Build hero date filter dropdown
  const allDates = [...new Set(items.map(i => i.date).filter(Boolean).sort().reverse())];
  const sel = document.getElementById('heroDateFilter');
  sel.innerHTML = '<option value="">📅 全部日期</option>';
  allDates.forEach(dateStr => {
    const dateObj = new Date(dateStr);
    const weekDays = ['日','一','二','三','四','五','六'];
    const label = dateStr.replace(/-/g, '.') + ' 周' + weekDays[dateObj.getDay()];
    sel.innerHTML += '<option value="' + dateStr + '">📅 ' + label + '</option>';
  });

  document.getElementById('updateTime').textContent = '共 ' + items.length + ' 条 · ' + allDates.length + ' 天数据';

  console.log('[OverseasFeedback] Building brand buttons...');
  buildBrandButtons();
  console.log('[OverseasFeedback] Applying filters...');
  const filteredCount = applyFilters();
  console.log('[OverseasFeedback] Filtered count:', filteredCount);
}

// Wrap in DOMContentLoaded for safety
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', renderPage);
} else {
  renderPage();
}
</script>
</body>
</html>
